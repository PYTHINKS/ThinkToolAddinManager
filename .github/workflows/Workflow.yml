name: build

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    name: ${{ matrix.configuration }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        configuration:
          - Release A20
          - Release A21
          - Release A22
          - Release A23
          - Release A24
          - Release A25
          - Release A26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ThinkToolAddinManager.sln --property:Configuration="${{ matrix.configuration }}"

      - name: Build
        run: dotnet build ThinkToolAddinManager.sln --configuration "${{ matrix.configuration }}" --no-restore
